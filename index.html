<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 Seed Savers</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, sans-serif; margin:0; background:#e8f5e9; color:#2e7d32; }
        header { background:#2e7d32; color:white; padding:20px; text-align:center; }
        .container { max-width:800px; margin:20px auto; padding:0 15px; }
        button { background:#2e7d32; color:white; border:none; padding:12px 20px; border-radius:8px; font-size:1.1rem; cursor:pointer; }
        input { width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:6px; font-size:1rem; }
        .plants-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:15px; }
        .plant-card { background:white; padding:10px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
        .modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; z-index:1000; }
    </style>
</head>
<body>
    <header><h1>🌱 Seed Savers Catalog</h1></header>

    <div class="container">
        <button onclick="showAddModal()">+ Add New Plant</button>
        <div id="plants-grid" class="plants-grid"></div>
    </div>

    <!-- Simple Add Modal -->
    <div id="add-modal" class="modal">
        <div style="background:white; padding:25px; border-radius:12px; width:90%; max-width:400px;">
            <h2>Add New Plant</h2>
            <input type="text" id="name" placeholder="Plant Name" />
            <input type="text" id="photo" placeholder="Photo URL (imgur, etc.)" />
            <br><br>
            <button onclick="savePlant()">Save Plant</button>
            <button onclick="hideModal()" style="background:#666;">Cancel</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://npivukmvibypwxaypzps.supabase.co';
        const supabaseKey = 'PASTE_YOUR_FULL_sb_publishable_pv_KEY_HERE';   // ←←← CHANGE THIS

        const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

        async function loadPlants() {
            console.log("Loading plants...");
            const { data, error } = await supabase.from('plants').select('*');
            if (error) console.error("Load error:", error);
            else renderPlants(data || []);
        }

        function renderPlants(plants) {
            const grid = document.getElementById('plants-grid');
            grid.innerHTML = plants.length === 0 
                ? "<p>No plants yet.</p>" 
                : plants.map(p => `
                    <div class="plant-card">
                        <img src="${p.photo || 'https://via.placeholder.com/300x200?text=No+Photo'}" style="width:100%; border-radius:8px;">
                        <h3>${p.name}</h3>
                    </div>
                `).join('');
        }

        function showAddModal() { document.getElementById('add-modal').style.display = 'flex'; }
        function hideModal() { document.getElementById('add-modal').style.display = 'none'; }

        async function savePlant() {
            const name = document.getElementById('name').value.trim();
            const photo = document.getElementById('photo').value.trim();

            if (!name) return alert("Name is required");

            const { error } = await supabase.from('plants').insert([{ name, photo }]);

            if (error) {
                console.error(error);
                alert("Error: " + error.message);
            } else {
                alert("Plant added!");
                hideModal();
                loadPlants();
            }
        }

        // Start
        window.onload = loadPlants;
    </script>
</body>
</html>
