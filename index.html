<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name - Welcome</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 50px 20px;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.4rem;
            max-width: 600px;
            margin: 0 auto 30px;
        }
        .button {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 14px 32px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 20px;
        }
        .button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>Hello, I'm [Your Name]</h1>
    <p>Welcome to my website. This is a simple page hosted on GitHub Pages.</p>
    <a href="#" class="button">Learn More About Me</a>
</body>
</html>
